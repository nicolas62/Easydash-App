server {
    # Cloud Run utilise le port 8080 par défaut
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # En-têtes de sécurité globaux pour autoriser les popups OAuth (Google Drive, etc.)
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Cross-Origin-Embedder-Policy "unsafe-none" always;

    location / {
        # Redirige toutes les requêtes vers index.html pour le routage SPA (React)
        try_files $uri $uri/ /index.html;
    }

    # Cache pour les fichiers statiques (optimisation)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        # Il est important de répéter les en-têtes ici car add_header dans un bloc location écrase ceux du niveau supérieur
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        add_header Cross-Origin-Embedder-Policy "unsafe-none" always;
    }
}
