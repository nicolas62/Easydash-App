services:
  easydash:
    image: ghcr.io/nicolas62/easydash-app:latest
    container_name: easydash_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - easydash_push_data:/app/data
    environment:
      - NODE_ENV=production
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@easydash.local}
      - PUSH_SECRET=${PUSH_SECRET}
      - PUSH_ALLOWED_ORIGIN=${PUSH_ALLOWED_ORIGIN:-}
      - ALLOW_INSECURE_TLS=${ALLOW_INSECURE_TLS:-false}
    # Uncomment and configure the labels below if you use Traefik as a reverse proxy.
    # Set TRAEFIK_HOST in your .env file (e.g. TRAEFIK_HOST=easydash.example.com).
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.easydash.rule=Host(`${TRAEFIK_HOST}`)"
    #   - "traefik.http.routers.easydash.entrypoints=websecure"
    #   - "traefik.http.routers.easydash.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.easydash.loadbalancer.server.port=3000"
    # networks:
    #   - your_traefik_network

volumes:
  easydash_push_data:
    name: easydash_push_data

# networks:
#   your_traefik_network:
#     external: true
